<!DOCTYPE html>
<html>
<head>
    <title>My GitHub M3U8 Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        video { width: 100%; max-width: 800px; outline: none; }
    </style>
</head>
<body>
    <video id="video" controls autofocus></video>

    <script>
        const video = document.getElementById('video');
        // This line grabs the ?url= part from your browser's address bar
        const streamUrl = new URLSearchParams(window.location.search).get('url');

        if (streamUrl) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // For Safari/iOS which has native support
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        } else {
            alert("Please add ?url=YOUR_M3U8_LINK to the address bar!");
        }
    </script>
</body>
</html>
