<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>HelloSports Player - Blue Edition</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: sans-serif;
  }

  #player-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 10px; /* Space for the border to breathe */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #shaka-container {
    width: 100%;
    height: 100%;
    background: #000;
    /* --- THE BLUE BORDER --- */
    border: 4px solid #007bff; 
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 123, 255, 0.5);
    overflow: hidden; /* Keeps video inside rounded corners */
  }

  #shaka-container video {
    width: 100%;
    height: 100%;
    background: #000;
  }

  /* Watermark badge - Changed to Blue */
  .wm {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 9999;
  }

  .wm a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #007bff; /* Blue */
    color: #fff;
    padding: 5px 11px;
    font-size: 13px;
    font-weight: 700;
    border-radius: 5px;
    text-decoration: none;
    animation: pulse 2.5s infinite ease-in-out;
    box-shadow: 0 2px 8px rgba(0, 123, 255, 0.5);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(0.98); }
  }

  /* Error state */
  #error-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #fff;
    background: #000;
    z-index: 20;
  }

  #error-msg.show { display: flex; }
  #error-msg a {
    background: #007bff;
    color: #fff;
    padding: 9px 20px;
    border-radius: 6px;
    text-decoration: none;
  }

  /* Loading spinner - Changed to Blue */
  #loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 10;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: #007bff; /* Blue */
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="player-wrap">
  <div id="loader"><div class="spinner"></div></div>

  <div class="wm">
    <a href="#">
      <svg viewBox="0 0 24 24" width="14" fill="white"><path d="M8 5v14l11-7z"/></svg>
      Live Stream
    </a>
  </div>

  <div id="error-msg">
    <p id="error-text">No stream URL provided. Use <code>?file=LINK</code></p>
  </div>

  <div id="shaka-container" data-shaka-player-container>
    <video id="video" data-shaka-player autoplay playsinline></video>
  </div>
</div>

<script>
(function () {
  "use strict";

  function param(name) {
    return new URLSearchParams(window.location.search).get(name) || "";
  }

  const fileUrl = param("file") || param("get");
  const loader = document.getElementById("loader");
  const errorEl = document.getElementById("error-msg");

  if (!fileUrl) {
    loader.style.display = "none";
    errorEl.classList.add("show");
    return;
  }

  shaka.polyfill.installAll();
  
  async function initPlayer() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const controls = ui.getControls();
    const player = controls.getPlayer();

    ui.configure({
      seekBarColors: {
        base: "rgba(255,255,255,0.3)",
        played: "#007bff" // Blue Seekbar
      }
    });

    try {
      await player.load(fileUrl);
      loader.style.display = "none";
    } catch (e) {
      console.error(e);
      errorEl.classList.add("show");
    }
  }

  document.addEventListener('shaka-ui-loaded', initPlayer);
})();
</script>
</body>
</html>
